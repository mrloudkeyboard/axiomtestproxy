<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Roboto:wght@100;300;400;700&display=swap"
        rel="stylesheet">
    <script src="./scripts/theme.js"></script>
    <link href="./styles/start.css" rel="stylesheet">
    <style>
        .search-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 600px;
        }
        .search-bar {
            width: 100%;
            box-sizing: border-box;
        }
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface, #1e1e2e);
            border: 1px solid var(--border, #444);
            border-top: none;
            border-radius: 0 0 8px 8px;
            z-index: 100;
            list-style: none;
            margin: 0;
            padding: 0;
            display: none;
        }
        .suggestions li {
            padding: 8px 14px;
            cursor: pointer;
            font-family: Roboto, sans-serif;
            font-size: 14px;
        }
        .suggestions li:hover,
        .suggestions li.active {
            background: var(--highlight, #313244);
        }
        .suggestions li:last-child {
            border-radius: 0 0 8px 8px;
        }
    </style>
</head>

<body>

    <main class="main">
        <h1 class="logo">Axiom</h1>
        <br>
        <div class="search-wrapper">
            <input placeholder="Search or enter URL" class="search-bar" type="text" id="search-input" autocomplete="off">
            <ul class="suggestions" id="suggestions"></ul>
        </div>
    </main>

    <script>
        const input = document.getElementById("search-input");
        const suggestionsList = document.getElementById("suggestions");
        let activeIndex = -1;
        let debounceTimer;

        input.addEventListener("input", () => {
            clearTimeout(debounceTimer);
            const q = input.value.trim();
            if (!q) { hideSuggestions(); return; }
            debounceTimer = setTimeout(() => fetchSuggestions(q), 150);
        });

        async function fetchSuggestions(q) {
            try {
                const res = await fetch(`/search_complete/${encodeURIComponent(q)}`);
                const data = await res.json();
                const suggestions = Array.isArray(data[1]) ? data[1].slice(0, 8) : [];
                renderSuggestions(suggestions);
            } catch (e) {
                hideSuggestions();
            }
        }

        function renderSuggestions(items) {
            suggestionsList.innerHTML = "";
            activeIndex = -1;
            if (items.length === 0) { hideSuggestions(); return; }
            items.forEach((text) => {
                const li = document.createElement("li");
                li.textContent = text;
                li.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    input.value = text;
                    hideSuggestions();
                    submitSearch(text);
                });
                suggestionsList.appendChild(li);
            });
            suggestionsList.style.display = "block";
        }

        function hideSuggestions() {
            suggestionsList.style.display = "none";
            suggestionsList.innerHTML = "";
            activeIndex = -1;
        }

        input.addEventListener("keydown", (e) => {
            const items = suggestionsList.querySelectorAll("li");
            if (e.key === "ArrowDown") {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
                updateActive(items);
            } else if (e.key === "ArrowUp") {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, -1);
                updateActive(items);
            } else if (e.key === "Enter") {
                if (activeIndex >= 0 && items[activeIndex]) {
                    input.value = items[activeIndex].textContent;
                    hideSuggestions();
                    submitSearch(input.value);
                } else {
                    hideSuggestions();
                    submitSearch(input.value);
                }
            } else if (e.key === "Escape") {
                hideSuggestions();
            }
        });

        function updateActive(items) {
            items.forEach((li, i) => li.classList.toggle("active", i === activeIndex));
            if (activeIndex >= 0) input.value = items[activeIndex].textContent;
        }

        document.addEventListener("click", (e) => {
            if (!e.target.closest(".search-wrapper")) hideSuggestions();
        });

        function submitSearch(query) {
            const isUrl = /^(https?:\/\/|[a-zA-Z0-9-]+\.[a-zA-Z]{2,})/.test(query);
            const url = isUrl && !query.startsWith("http") ? "https://" + query : isUrl ? query : `https://search.brave.com/search?q=${encodeURIComponent(query)}`;
            const encodedUrl = btoa(url);
            window.location.href = `/render.html?url=${encodedUrl}`;
        }
    </script>
</body>

</html>
